version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: contentops_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: contentops_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: contentops_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
